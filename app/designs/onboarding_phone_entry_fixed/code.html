<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dating App Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff4255",
                        "background-light": "#f8f5f6",
                        "background-dark": "#0F172A",
                        "card-dark": "#1E293B",
                        "border-dark": "#334155"
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<!-- Mobile Container (390px simulated) -->
<div class="relative w-full max-w-[390px] min-h-[844px] bg-background-light dark:bg-background-dark overflow-hidden flex flex-col rounded-3xl shadow-2xl border border-white/5">
<!-- Top App Bar & Progress -->
<header class="flex flex-col w-full px-6 pt-8 pb-2 gap-4">
<div class="flex items-center justify-between">
<button class="text-slate-400 hover:text-white transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Step 1 of 5</span>
</div>
<div class="flex items-center">
<span class="text-xs font-bold text-primary/80">20% Complete</span>
</div>
</div>
<div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-purple-500 rounded-full w-[20%]"></div>
</div>
</header>
<!-- Content -->
<div class="px-6 flex-1 flex flex-col">
<h1 class="text-3xl font-bold mt-8 mb-3 tracking-tight text-slate-900 dark:text-white">Enter your phone number</h1>
<p class="text-slate-600 dark:text-text-secondary text-base leading-relaxed mb-10">
                We'll send a code to verify your account. Message and data rates may apply.
            </p>
<!-- Input Section in Glass Container -->
<div class="bg-card-dark border border-border-dark rounded-xl p-6 space-y-5">
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-text-secondary/60 ml-1">Country</label>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 flex items-center gap-2">
<span class="text-xl">🇺🇸</span>
</div>
<select class="w-full h-14 pl-14 pr-10 bg-transparent border-slate-300 dark:border-slate-custom rounded-xl text-slate-900 dark:text-white focus:ring-primary focus:border-primary appearance-none">
<option>United States (+1)</option>
<option>United Kingdom (+44)</option>
<option>Canada (+1)</option>
<option>Australia (+61)</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">expand_more</span>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-text-secondary/60 ml-1">Phone Number</label>
<input class="w-full h-14 px-4 bg-transparent border-slate-300 dark:border-slate-custom rounded-xl text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600 focus:ring-primary focus:border-primary text-lg" placeholder="(555) 000-0000" type="tel"/>
</div>
</div>
<!-- Footer Action -->
<div class="mt-auto pb-10">
<button class="w-full py-4 rounded-xl bg-gradient-to-r from-primary to-purple-600 text-white font-bold text-lg shadow-xl shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Continue
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="text-center text-xs text-slate-500 dark:text-text-secondary/40 mt-6 px-4">
                    By continuing, you agree to our Terms of Service and Privacy Policy.
                </p>
</div>
</div>
<!-- Simulated Numeric Keyboard -->
<div class="bg-slate-900/50 dark:bg-black/20 backdrop-blur-xl border-t border-white/5 p-2 grid grid-cols-3 gap-2">
<div class="h-12 flex items-center justify-center font-semibold text-xl dark:text-white">1</div>
<div class="h-12 flex items-center justify-center font-semibold text-xl dark:text-white">2</div>
<div class="h-12 flex items-center justify-center font-semibold text-xl dark:text-white">3</div>
<div class="h-12 flex items-center justify-center font-semibold text-xl dark:text-white">4</div>
<div class="h-12 flex items-center justify-center font-semibold text-xl dark:text-white">5</div>
<div class="h-12 flex items-center justify-center font-semibold text-xl dark:text-white">6</div>
<div class="h-12 flex items-center justify-center font-semibold text-xl dark:text-white">7</div>
<div class="h-12 flex items-center justify-center font-semibold text-xl dark:text-white">8</div>
<div class="h-12 flex items-center justify-center font-semibold text-xl dark:text-white">9</div>
<div class="h-12 flex items-center justify-center font-semibold text-xl dark:text-white"></div>
<div class="h-12 flex items-center justify-center font-semibold text-xl dark:text-white">0</div>
<div class="h-12 flex items-center justify-center font-semibold text-xl dark:text-white">
<span class="material-symbols-outlined">backspace</span>
</div>
<div class="col-span-3 h-1.5 flex justify-center py-4">
<div class="w-32 h-1.5 bg-slate-400/30 rounded-full"></div>
</div>
</div>
<!-- Background Decorative Element -->
</div>
</body></html>
