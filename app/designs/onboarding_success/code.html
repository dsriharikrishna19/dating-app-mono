<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HeartBeat - Welcome</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff4255",
                        "secondary": "#a855f7",
                        "background-light": "#f8f5f6",
                        "background-dark": "#0F172A",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "24px",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Subtle Sparkle/Confetti Elements -->
<div class="absolute inset-0 pointer-events-none opacity-40">
<div class="absolute top-20 left-[10%] w-2 h-2 rounded-full bg-primary blur-[1px]"></div>
<div class="absolute top-40 right-[15%] w-3 h-3 rounded-full bg-secondary blur-[1px]"></div>
<div class="absolute bottom-1/3 left-[20%] w-2 h-2 rounded-full bg-primary/60 blur-[1px]"></div>
<div class="absolute top-1/4 right-[25%] w-1.5 h-1.5 rounded-full bg-white blur-[1px]"></div>
<div class="absolute bottom-40 right-[10%] w-2.5 h-2.5 rounded-full bg-secondary/80 blur-[1px]"></div>
<div class="absolute top-[60%] left-[8%] w-1.5 h-1.5 rotate-45 bg-primary/40"></div>
<div class="absolute top-[15%] right-[40%] w-2 h-2 rotate-12 bg-secondary/30"></div>
</div>
<!-- Top Navigation -->
<div class="flex items-center p-6 justify-between z-10">
<div class="text-slate-400 flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-2xl">close</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary fill-1">favorite</span>
<h2 class="text-slate-100 text-lg font-extrabold leading-tight tracking-tight font-display uppercase italic">HeartBeat</h2>
</div>
<div class="size-12"></div> <!-- Spacer for symmetry -->
</div>
<!-- Main Content -->
<div class="flex-1 flex flex-col items-center justify-center px-6 text-center z-10">
<!-- Hero Icon Section -->
<div class="relative mb-12">
<!-- Outer Glow -->
<div class="absolute inset-0 bg-gradient-to-tr from-primary to-secondary blur-3xl opacity-30 scale-150"></div>
<!-- Main Icon Circle -->
<div class="relative w-40 h-40 rounded-full bg-gradient-to-tr from-primary to-secondary flex items-center justify-center shadow-2xl shadow-primary/20">
<span class="material-symbols-outlined text-white text-7xl font-bold">check_circle</span>
</div>
<!-- Floating Heart Element -->
<div class="absolute -top-4 -right-4 w-12 h-12 rounded-2xl bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-primary fill-1 text-2xl">favorite</span>
</div>
</div>
<!-- Typography -->
<div class="max-w-xs mx-auto">
<h1 class="text-slate-100 tracking-tight text-4xl font-extrabold leading-tight mb-4 font-display">
                    You're all set!
                </h1>
<p class="text-slate-400 text-lg font-normal leading-relaxed">
                    Your profile is ready. Start discovering amazing people near you.
                </p>
</div>
</div>
<!-- Bottom Action -->
<div class="px-6 py-10 z-10">
<div class="max-w-md mx-auto">
<button class="w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-2xl h-16 bg-gradient-to-r from-primary to-secondary text-white text-lg font-bold shadow-xl shadow-primary/30 transition-transform active:scale-95">
<span class="flex items-center gap-2">
                        Start Matching
                        <span class="material-symbols-outlined text-xl">bolt</span>
</span>
</button>
<p class="text-slate-500 text-sm mt-6 text-center font-medium">
                    Joining over 2M members today
                </p>
</div>
</div>
<!-- Decorative Background Layer -->
<div class="absolute -bottom-20 -left-20 w-80 h-80 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute -top-20 -right-20 w-80 h-80 bg-secondary/10 rounded-full blur-3xl"></div>
</div>
</body></html>
