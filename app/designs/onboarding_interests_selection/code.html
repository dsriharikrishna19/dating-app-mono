<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Interests Selection - Premium Dating</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff4255",
                        "background-light": "#f8f5f6",
                        "background-dark": "#230f11",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-md mx-auto min-h-screen flex flex-col relative pb-32">
<!-- Progress Bar Component -->
<div class="flex flex-col gap-3 p-6 sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10">
<div class="flex gap-6 justify-between items-center">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider">Step 3 of 5</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">60% Complete</p>
</div>
<div class="rounded-full bg-primary/20 h-2 w-full overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 60%;"></div>
</div>
</div>
<!-- Header Section -->
<header class="px-6 pt-4">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-extrabold leading-tight tracking-tight">What are you into?</h1>
<p class="text-slate-600 dark:text-slate-400 text-base mt-2">Select at least 5 interests to help us find better matches.</p>
</header>
<!-- Search Bar -->
<div class="px-6 py-6">
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">search</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-slate-100 dark:bg-primary/10 border-none rounded-xl text-slate-900 dark:text-white placeholder:text-slate-500 focus:ring-2 focus:ring-primary focus:bg-white dark:focus:bg-background-dark transition-all" placeholder="Search interests..." type="text"/>
</div>
</div>
<!-- Categories and Tags -->
<div class="px-6 space-y-8 overflow-y-auto">
<!-- Creativity Category -->
<section>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">palette</span>
                    Creativity
                </h3>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-sm font-medium hover:border-primary transition-colors">Photography</button>
<button class="px-4 py-2 rounded-full bg-primary text-white text-sm font-medium shadow-lg shadow-primary/20">Design</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-sm font-medium hover:border-primary transition-colors">Writing</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-sm font-medium hover:border-primary transition-colors">Painting</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-sm font-medium hover:border-primary transition-colors">Movies</button>
</div>
</section>
<!-- Sports Category -->
<section>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">fitness_center</span>
                    Sports &amp; Fitness
                </h3>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-sm font-medium hover:border-primary transition-colors">Yoga</button>
<button class="px-4 py-2 rounded-full bg-primary text-white text-sm font-medium shadow-lg shadow-primary/20">Running</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-sm font-medium hover:border-primary transition-colors">Tennis</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-sm font-medium hover:border-primary transition-colors">Swimming</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-sm font-medium hover:border-primary transition-colors">Hiking</button>
</div>
</section>
<!-- Food & Drink Category -->
<section>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">restaurant</span>
                    Food &amp; Drink
                </h3>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full bg-primary text-white text-sm font-medium shadow-lg shadow-primary/20">Cooking</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-sm font-medium hover:border-primary transition-colors">Wine</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-sm font-medium hover:border-primary transition-colors">Coffee</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-sm font-medium hover:border-primary transition-colors">Baking</button>
<button class="px-4 py-2 rounded-full bg-primary text-white text-sm font-medium shadow-lg shadow-primary/20">Vegan</button>
</div>
</section>
<!-- Music Category -->
<section>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">music_note</span>
                    Music
                </h3>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-sm font-medium hover:border-primary transition-colors">Live Concerts</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-sm font-medium hover:border-primary transition-colors">Jazz</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-sm font-medium hover:border-primary transition-colors">Rock</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-sm font-medium hover:border-primary transition-colors">Techno</button>
</div>
</section>
</div>
<!-- Sticky Footer Action -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-6 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light/95 dark:via-background-dark/95 to-transparent">
<div class="flex flex-col gap-4">
<div class="flex justify-between items-center px-2">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Selected: 4/5</p>
<p class="text-primary text-sm font-bold">1 more to go</p>
</div>
<!-- Disabled State: bg-slate-300 dark:bg-slate-700 cursor-not-allowed -->
<button class="w-full py-4 bg-slate-300 dark:bg-slate-700 text-slate-500 dark:text-slate-400 font-bold rounded-xl text-lg cursor-not-allowed transition-all">
                    Continue
                </button>
</div>
</div>
</div>
</body></html>
