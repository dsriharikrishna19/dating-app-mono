<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff4255",
                        "background-light": "#f8f5f6",
                        "background-dark": "#0F172A",
                        "card-dark": "#1E293B",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .interest-chip-selected {
            background: linear-gradient(135deg, #ff4255 0%, #9333ea 100%);
            border-color: transparent;
        }
        .brand-gradient {
            background: linear-gradient(135deg, #ff4255 0%, #9333ea 100%);
        }
    </style>
<style>
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .interest-chip-selected {
            background: linear-gradient(135deg, #ff4255 0%, #9333ea 100%);
            border-color: transparent;
        }
        .brand-gradient {
            background: linear-gradient(135deg, #ff4255 0%, #9333ea 100%);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Top Navigation -->
<div class="flex items-center p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex-1 px-4">
<div class="flex flex-col gap-1">
<div class="flex justify-between items-center mb-1">
<span class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Step 3 of 5</span>
<span class="text-xs font-bold text-primary">60%</span>
</div>
<div class="h-1.5 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full rounded-full brand-gradient" style="width: 60%;"></div>
</div>
</div>
</div>
<div class="size-12"></div> <!-- Spacer for balance -->
</div>
<!-- Title Section -->
<header class="px-6 pt-8 pb-4">
<h1 class="text-slate-900 dark:text-white text-3xl font-bold leading-tight mb-2">What are you into?</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal">Select at least 5 interests to help us find your perfect match.</p>
</header>
<!-- Search Bar -->
<div class="px-6 py-4">
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors">search</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-white/5 border border-white/10 rounded-2xl text-slate-100 placeholder-slate-500 focus:ring-2 focus:ring-primary/40 focus:bg-white/10 transition-all outline-none backdrop-blur-md" placeholder="Search interests..." type="text"/>
</div>
</div>
<!-- Interests Grid -->
<main class="flex-1 px-6 py-4 overflow-y-auto pb-32">
<!-- Category: Creativity -->
<div class="mb-8">
<h3 class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">Creativity</h3>
<div class="flex flex-wrap gap-3">
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium hover:border-primary transition-all bg-white/5">Photography</button>
<button class="px-4 py-2 rounded-full interest-chip-selected text-white text-sm font-medium shadow-lg shadow-primary/20">Design</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium hover:border-primary transition-all bg-white/5">Writing</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium hover:border-primary transition-all bg-white/5">Painting</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium hover:border-primary transition-all bg-white/5">Fashion</button>
</div>
</div>
<!-- Category: Sports & Wellness -->
<div class="mb-8">
<h3 class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">Sports &amp; Wellness</h3>
<div class="flex flex-wrap gap-3">
<button class="px-4 py-2 rounded-full interest-chip-selected text-white text-sm font-medium shadow-lg shadow-primary/20">Yoga</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium hover:border-primary transition-all bg-white/5">Hiking</button>
<button class="px-4 py-2 rounded-full interest-chip-selected text-white text-sm font-medium shadow-lg shadow-primary/20">Gym</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium hover:border-primary transition-all bg-white/5">Running</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium hover:border-primary transition-all bg-white/5">Surfing</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium hover:border-primary transition-all bg-white/5">Swimming</button>
</div>
</div>
<!-- Category: Food & Drink -->
<div class="mb-8">
<h3 class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">Food &amp; Drink</h3>
<div class="flex flex-wrap gap-3">
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium hover:border-primary transition-all bg-white/5">Coffee</button>
<button class="px-4 py-2 rounded-full interest-chip-selected text-white text-sm font-medium shadow-lg shadow-primary/20">Wine Tasting</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium hover:border-primary transition-all bg-white/5">Cooking</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium hover:border-primary transition-all bg-white/5">Vegan</button>
<button class="px-4 py-2 rounded-full interest-chip-selected text-white text-sm font-medium shadow-lg shadow-primary/20">Sushi</button>
</div>
</div>
<!-- Category: Entertainment -->
<div class="mb-8">
<h3 class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">Music &amp; Fun</h3>
<div class="flex flex-wrap gap-3">
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium hover:border-primary transition-all bg-white/5">Techno</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium hover:border-primary transition-all bg-white/5">Jazz</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium hover:border-primary transition-all bg-white/5">Gaming</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium hover:border-primary transition-all bg-white/5">Board Games</button>
<button class="px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium hover:border-primary transition-all bg-white/5">Movies</button>
</div>
</div>
</main>
<!-- Fixed Footer Selection & Action -->
<div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-dark via-background-dark/95 to-transparent pointer-events-none">
<div class="max-w-md mx-auto pointer-events-auto">
<div class="flex justify-center mb-4">
<div class="bg-card-dark/80 backdrop-blur-md px-4 py-2 rounded-full border border-slate-700 flex items-center gap-2">
<span class="flex items-center justify-center w-5 h-5 rounded-full brand-gradient text-[10px] font-bold text-white">5</span>
<span class="text-xs font-semibold text-slate-300">interests selected</span>
</div>
</div>
<!-- Vibrant Gradient Button (Active State) -->
<button class="w-full py-4 rounded-2xl text-white font-bold text-lg brand-gradient shadow-2xl shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    Continue
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Example of disabled state (commented out in actual logic, but here for UI reference) -->
<!-- 
                <button disabled class="w-full py-4 rounded-xl text-slate-500 font-bold text-lg bg-slate-800 border border-slate-700 cursor-not-allowed flex items-center justify-center gap-2">
                    Select 5 to continue
                </button> 
                -->
</div>
</div>
</div>
</body></html>
